  humanoid: ['Humanoid','AnimationTrack','Animator'],
  rendering: ['RenderJob','RenderView','VisualEngine','BloomEffect','BlurEffect','DepthOfFieldEffect','SunRaysEffect','ColorCorrectionEffect','ColorGradingEffect','Atmosphere','Sky','Lighting'],
  gui: ['GuiObject','GuiBase2D'],
  pointers: null // handled specially
};

let activeFilter = 'all';
let activeNs = null;
let searchVal = '';

const POINTER_KEYS = ['Pointer','RealDataModel','FakeDataModel'];

function isPointerOffset(key, val) {
  return POINTER_KEYS.some(k => key.includes(k)) || val > 0x1000000;
}

function hexStr(val) {
  return '0x' + val.toString(16).toUpperCase().padStart(3,'0');
}

function getFiltered() {
  const q = searchVal.toLowerCase();
  let result = {};
  for (const [ns, offsets] of Object.entries(RAW)) {
    // namespace filter
    if (activeNs && ns !== activeNs) continue;
    // group filter
    if (activeFilter !== 'all') {
      if (activeFilter === 'pointers') {
        // only show pointer offsets
        const filtered = Object.fromEntries(Object.entries(offsets).filter(([k,v]) => isPointerOffset(k,v)));
        if (Object.keys(filtered).length === 0) continue;
        if (q) {
          const ff = Object.fromEntries(Object.entries(filtered).filter(([k]) => k.toLowerCase().includes(q) || ns.toLowerCase().includes(q)));
          if (Object.keys(ff).length === 0) continue;
          result[ns] = ff;
        } else {
          result[ns] = filtered;
        }
        continue;
      }
      if (!FILTER_GROUPS[activeFilter].includes(ns)) continue;
    }
    if (q) {
      const filtered = Object.fromEntries(Object.entries(offsets).filter(([k]) => k.toLowerCase().includes(q) || ns.toLowerCase().includes(q)));
      if (Object.keys(filtered).length === 0) continue;
      result[ns] = filtered;
    } else {
      result[ns] = offsets;
    }
  }
  return result;
}

function totalOffsets(data) {
  return Object.values(data).reduce((a,b) => a + Object.keys(b).length, 0);
}

function renderSidebar(data) {
  const sidebar = document.getElementById('sidebar');

  const all = document.createElement('div');
  all.className = 'ns-item' + (activeNs === null ? ' active' : '');
  all.innerHTML = `<span class="ns-name">ALL</span><span class="ns-count">${totalOffsets(RAW)}</span>`;
  all.onclick = () => { activeNs = null; render(); };
  sidebar.appendChild(all);
  for (const [ns, offsets] of Object.entries(RAW)) {
    const item = document.createElement('div');
    item.className = 'ns-item' + (activeNs === ns ? ' active' : '');
    item.innerHTML = `<span class="ns-name">${ns}</span><span class="ns-count">${Object.keys(offsets).length}</span>`;
    item.onclick = () => { activeNs = ns; render(); };
    sidebar.appendChild(item);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

function copyOffset(ns, key, val) {
  const text = `Offsets::${ns}::${key} = ${hexStr(val)}`;
  navigator.clipboard.writeText(text).catch(() => {});
  showToast(`copied ${ns}::${key}`);
}

function render() {
  const data = getFiltered();
  const content = document.getElementById('content');
  const rc = document.getElementById('result-count');
  const total = totalOffsets(data);

  document.getElementById('ns-count').textContent = Object.keys(RAW).length;
  document.getElementById('visible-count').textContent = total;
  renderSidebar(data);

  if (total === 0) {
    content.innerHTML = '<div class="empty">no offsets match your search</div>';
    return;

  content.innerHTML = '';
  for (const [ns, offsets] of Object.entries(data)) {
    const section = document.createElement('div');
    section.className = 'ns-section';
    const header = document.createElement('div');
    header.className = 'ns-header';
    header.innerHTML = `<span class="ns-header-name">${ns}</span><span class="ns-header-count">${Object.keys(offsets).length} offsets</span>`;

      const isPtr = isPointerOffset(key, val);
      row.className = 'offset-row' + (isPtr ? ' is-pointer' : '');
      row.innerHTML = `<span class="offset-name">${key}</span><span class="offset-value">${hexStr(val)}</span><span class="copy-hint">click to copy</span>`;
      row.onclick = () => {
        copyOffset(ns, key, val);
        row.classList.add('copied');
        setTimeout(() => row.classList.remove('copied'), 600);
      };
      grid.appendChild(row);
    }
    section.appendChild(grid);
    content.appendChild(section);
  }
}

document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value;
  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  render();
});

render();
</script>
</body>
</html>
